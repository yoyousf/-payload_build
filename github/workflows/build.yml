name: Build Payload EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller requests
      - run: pyinstaller --onefile --noconsole --name payload victim_payload.py
      - uses: actions/upload-artifact@v4
        with:
          name: payload-exe
          path: dist/payload.exe
